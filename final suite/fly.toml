# Fly.io config for the FastAPI backend.
# `app` is set on first `flyctl launch` — leave the placeholder; flyctl will
# overwrite it after asking you to pick a name.
app = "firefighter-suite-api"
primary_region = "fra"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "get"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpus = 1
