<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 475" font-family="Charter, Hoefler Text, Georgia, serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
  </defs>

  <!-- Stakeholder (top) -->
  <g>
    <rect x="240" y="20" width="240" height="48" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="360" y="42" text-anchor="middle" font-size="13" font-weight="700">OGM / Fire Response Teams</text>
    <text x="360" y="60" text-anchor="middle" font-size="11" font-style="italic" fill="#444">stakeholder</text>
  </g>

  <!-- Arrow stakeholder → system -->
  <line x1="360" y1="68" x2="360" y2="178" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="370" y="125" font-size="11" font-style="italic" fill="#444">policies, k</text>

  <!-- Inputs (left) -->
  <g>
    <rect x="20" y="180" width="180" height="80" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="110" y="206" text-anchor="middle" font-size="13" font-weight="700">Geographic Data</text>
    <text x="110" y="227" text-anchor="middle" font-size="11" fill="#222">ESA WorldCover · OSM</text>
    <text x="110" y="245" text-anchor="middle" font-size="11" fill="#222">risk maps</text>
  </g>
  <g>
    <rect x="20" y="300" width="180" height="80" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="110" y="326" text-anchor="middle" font-size="13" font-weight="700">Graph Parameters</text>
    <text x="110" y="347" text-anchor="middle" font-size="11" fill="#222">bbox · n · k</text>
    <text x="110" y="365" text-anchor="middle" font-size="11" fill="#222">fire origin</text>
  </g>

  <!-- Central system -->
  <g>
    <rect x="270" y="180" width="180" height="200" fill="#fff" stroke="#000" stroke-width="1.6"/>
    <text x="360" y="206" text-anchor="middle" font-size="14" font-weight="700">Stop the Fire!</text>
    <text x="360" y="224" text-anchor="middle" font-size="12" font-style="italic" fill="#222">decision support system</text>
    <line x1="290" y1="240" x2="430" y2="240" stroke="#000" stroke-width="0.4"/>
    <text x="290" y="262" font-size="11">• Map-to-graph pipeline</text>
    <text x="290" y="284" font-size="11">• Simulation engine</text>
    <text x="290" y="306" font-size="11">• Seven strategies + random</text>
    <text x="290" y="328" font-size="11">• Topology-aware recommender</text>
    <text x="290" y="350" font-size="11">• Web suite (FastAPI/React)</text>
  </g>

  <!-- Input arrows -->
  <line x1="200" y1="220" x2="270" y2="240" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="200" y1="340" x2="270" y2="320" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Outputs (right) -->
  <g>
    <rect x="520" y="160" width="180" height="60" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="610" y="184" text-anchor="middle" font-size="12" font-weight="700">Strategy Recommendation</text>
    <text x="610" y="204" text-anchor="middle" font-size="11" fill="#222">ordered vertex list + reason</text>
  </g>
  <g>
    <rect x="520" y="240" width="180" height="60" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="610" y="264" text-anchor="middle" font-size="12" font-weight="700">Performance Report</text>
    <text x="610" y="284" text-anchor="middle" font-size="11" fill="#222">burned %, runtime, animation</text>
  </g>
  <g>
    <rect x="520" y="320" width="180" height="60" fill="#fff" stroke="#000" stroke-width="1.6" stroke-dasharray="4,3"/>
    <text x="610" y="344" text-anchor="middle" font-size="12" font-weight="700">Decision Makers</text>
    <text x="610" y="364" text-anchor="middle" font-size="11" font-style="italic" fill="#222">field planner (end user)</text>
  </g>

  <!-- Output arrows -->
  <line x1="450" y1="220" x2="520" y2="190" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="450" y1="280" x2="520" y2="270" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="450" y1="340" x2="520" y2="350" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <g transform="translate(20, 440)">
    <line x1="0" y1="10" x2="30" y2="10" stroke="#000" stroke-width="1.2"/>
    <text x="38" y="14" font-size="10.5">solid border = input / output</text>
    <line x1="220" y1="10" x2="250" y2="10" stroke="#000" stroke-width="1.6" stroke-dasharray="4,3"/>
    <text x="258" y="14" font-size="10.5">dashed border = end user</text>
    <line x1="430" y1="10" x2="460" y2="10" stroke="#000" stroke-width="1.6"/>
    <text x="468" y="14" font-size="10.5">heavy border = the system itself</text>
  </g>

</svg>
